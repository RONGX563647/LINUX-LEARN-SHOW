<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux命令学习系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="terminal-fullscreen">
        <!-- 左侧信息面板 -->
        <div class="sidebar-panel" id="sidebarPanel">
            <div class="sidebar-header">
                <div class="sidebar-header-dots">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <span class="sidebar-header-title">Linux Learn</span>
                <span class="sidebar-header-badge" id="progressBadge">0%</span>
            </div>
            <div id="sidebarContent" class="sidebar-home-content"></div>
            <div class="sidebar-footer">
                <div class="sidebar-footer-actions">
                    <button class="sidebar-action-btn primary" onclick="app.startTutorial()">📖 教程</button>
                    <button class="sidebar-action-btn primary" onclick="app.startPractice()">🎯 实战</button>
                    <button class="sidebar-action-btn" onclick="app.randomChallenge()">🎲 随机</button>
                    <button class="sidebar-action-btn" onclick="app.goHome()">🏠 首页</button>
                </div>
            </div>
        </div>
        <!-- 右侧终端 -->
        <div class="terminal-area">
            <div class="terminal-titlebar">
                <div class="terminal-dots">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <span class="terminal-titletext">user@linux:~ — Terminal</span>
                <div class="header-links">
                    <a href="https://github.com/RONGX563647/LINUX-LEARN-SHOW" target="_blank" class="header-link">GitHub</a>
                    <a href="https://www.rongx.top" target="_blank" class="header-link">Blog</a>
                </div>
            </div>
            <div id="terminalContainer"></div>
        </div>
    </div>

    <script src="js/commands.js"></script>
    <script src="js/scenarios.js"></script>
    <script src="js/validator.js"></script>
    <script src="js/terminal.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
