<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教程版 - Linux命令学习系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="terminal-fullscreen">
        <div class="terminal-mode-bar">
            <span class="terminal-mode-title">📚 教程模式</span>
            <div class="terminal-mode-actions">
                <button class="btn btn-sm" id="randomBtn">🎲 随机</button>
                <button class="btn btn-sm" id="helpBtn">帮助</button>
                <button class="btn btn-sm btn-danger" id="resetBtn">重置</button>
            </div>
        </div>
        <div id="terminalContainer"></div>
        <div class="terminal-footer">
            <span class="footer-hint">输入 <span class="hint-key">help</span> 查看帮助 | <span class="hint-key">list</span> 查看关卡 | <span class="hint-key">goto [n]</span> 跳转关卡</span>
        </div>
    </div>

    <script src="js/commands.js"></script>
    <script src="js/scenarios.js"></script>
    <script src="js/validator.js"></script>
    <script src="js/terminal.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
